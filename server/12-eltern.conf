#hier ein anderer weg, ich lasse letsencrypt nur hier laufen, auf den ubtest wird immer über 
#diesen rechner zugegriffen, er verteilt also nur, nie ein direkter zugriff auf ubtest
# in bk-rheinbach.net-ergaenzt.zone ergänzt 
# eltern        IN CNAME  schulix
# erstmal den ssl-block unten heraus
# sudo certbot certonly --webroot -w /var/www/html -d eltern.bk-rheinbach.net auf schulix
# Server : ubtest.bk-rheinbach.net → 192.168.2.196
# dann mit den Zertifikaten den ssl-block dazu nehmen (oder halt vorher andere zertifikate eintragen)
<VirtualHost *:80>
    ServerName eltern.bk-rheinbach.net

    # Let's Encrypt Challenge
    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory /var/www/html/.well-known/acme-challenge/>
        Require all granted
    </Directory>

    # Umleitung zu HTTPS (außer für Let's Encrypt)
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/eltern-error.log
    CustomLog ${APACHE_LOG_DIR}/eltern-access.log combined
</VirtualHost>

#erst nach dem certbot ssl dazu 
#aufruf mit 
# HTTPS VirtualHost (Port 443)
#
<VirtualHost *:443>
    ServerName eltern.bk-rheinbach.net

    # SSL aktivieren
    SSLEngine on
    
    # Diese Zeilen werden von Certbot automatisch eingefügt/aktualisiert:
    # nein manuell eingetragen, habe --certonly verwendet (mehr kontrolle)
    #Successfully received certificate.
    #Certificate is saved at: /etc/letsencrypt/live/eltern.bk-rheinbach.net/fullchain.pem
		#Key is saved at:         /etc/letsencrypt/live/eltern.bk-rheinbach.net/privkey.pem
		#This certificate expires on 2026-06-01.
		#These files will be updated when the certificate renews.
		#Certbot has set up a scheduled task to automatically renew this certificate in the background.

    SSLCertificateFile /etc/letsencrypt/live/eltern.bk-rheinbach.net/fullchain.pem
    SSLCertificateKeyFile  /etc/letsencrypt/live/eltern.bk-rheinbach.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Reverse Proxy zum Backend
    ProxyPreserveHost On
    ProxyPass / http://192.168.2.196/
    ProxyPassReverse / http://192.168.2.196/

    # WebSocket
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(.*) ws://192.168.2.196:80/$1 [P,L]

    # Header für HTTPS-Weiterleitung
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ErrorLog ${APACHE_LOG_DIR}/eltern-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/eltern-ssl-access.log combined
</VirtualHost>
